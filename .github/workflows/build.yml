name: Build otlg binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: otlg-macos-arm64
          - os: ubuntu-latest
            artifact: otlg-linux-amd64
          - os: windows-latest
            artifact: otlg-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build binary
        run: uv run pyinstaller --clean --noconfirm scripts/otlg.spec

      - name: Rename artifact
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            cp dist/otlg.exe dist/${{ matrix.artifact }}
          else
            cp dist/otlg dist/${{ matrix.artifact }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
